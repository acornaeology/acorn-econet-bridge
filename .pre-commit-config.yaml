repos:
  - repo: local
    hooks:
      - id: readme-check
        name: Check README.md is up to date
        entry: uv run generate_readme.py --check
        language: system
        files: '(README\.md\.j2|generate_readme\.py|acornaeology\.json|rom\.json)$'
        pass_filenames: false
      - id: shared-code-check
        name: Check docs/SHARED-CODE.md is up to date with shared-code.json
        entry: uv run tools/render_shared_code.py --check
        language: system
        files: '(shared-code\.json|tools/render_shared_code\.py)$'
        pass_filenames: false
