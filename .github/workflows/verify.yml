name: Verify disassembly

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Check README.md is up to date
        run: uv run generate_readme.py --check

      - name: Check docs/SHARED-CODE.md is up to date
        run: uv run tools/render_shared_code.py --check

  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ["1"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Build beebasm
        uses: actions/cache@v4
        id: beebasm-cache
        with:
          path: /usr/local/bin/beebasm
          key: beebasm-v1.11-rebuild

      - name: Build beebasm from source
        if: steps.beebasm-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v1.11 https://github.com/stardot/beebasm.git /tmp/beebasm
          cmake -S /tmp/beebasm -B /tmp/beebasm/build
          make -C /tmp/beebasm/build -j$(nproc)
          sudo cp /tmp/beebasm/build/beebasm /usr/local/bin/

      - name: Disassemble Acorn Econet Bridge ${{ matrix.version }}
        run: uv run acorn-econet-bridge-disasm-tool disassemble ${{ matrix.version }}

      - name: Lint Acorn Econet Bridge ${{ matrix.version }}
        run: uv run acorn-econet-bridge-disasm-tool lint ${{ matrix.version }}

      - name: Verify Acorn Econet Bridge ${{ matrix.version }}
        run: uv run acorn-econet-bridge-disasm-tool verify ${{ matrix.version }}
